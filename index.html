<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>snake game</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main>
        <section>
        <div class="infos">
            <div class="info">
                <h3>High score:
                    <span id="high-score">0</span>
                </h3>
            </div>
            <div class="info">
                <h3>Score: 
                    <span id="score">0</span>
                </h3>
            </div>
            <div class="info">
                <h3>Time:
                    <span id="time"> 00-00 </span>
                </h3>
            </div>
        </div>
        <div class="board">
        </div>
        </section>
    </main>
    <div class="gameStart-end">
        <div class="start">
            <h3>Welcome to Snake Game</h3>
            <button class="btn" id="btn-start"> Start Game</button>
        </div>
        <div class="end">
            <h3>Game over :) </h3>
            <button class="btn" id="btn-restart">Restart Game</button>
        </div>
    </div>
    <script src="/script.js"> </script>
</body>
</html>
